<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>¡Nos Fuimos!</title>

<!-- PWA: manifest -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0E7C7B" />

<!-- Soporte iOS (Safari no lee bien el manifest, necesita estas etiquetas) -->
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Nos Fuimos!" />

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0E7C7B;
    overflow: hidden;
  }
  #screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    background: linear-gradient(180deg, #0E7C7B 0%, #F0993D 100%);
    color: white;
    font-family: -apple-system, system-ui, sans-serif;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  #screen img {
    width: 88px;
    height: 88px;
    border-radius: 20px;
    box-shadow: 0 10px 24px rgba(0,0,0,.25);
  }
  #screen h1 { font-size: 22px; margin: 4px 0 0; }
  #screen p { margin: 0; opacity: .9; font-size: 15px; }
  #openBtn {
    margin-top: 12px;
    background: white;
    color: #0E7C7B;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  #hint {
    margin-top: 18px;
    font-size: 13px;
    opacity: .85;
    max-width: 280px;
  }
</style>
</head>
<body>

  <!--
    ==========================================================
    ACÁ VA LA URL DE TU APP DE APPS SCRIPT (la que termina en /exec)
    ==========================================================
  -->
  <div id="screen">
    <img src="icons/icon-192.png" alt="Nos Fuimos!" />
    <h1>¡Nos Fuimos!</h1>
    <p>Planeación colaborativa de vacaciones</p>
    <button id="openBtn">Abrir la app ✈️</button>
    <div id="hint">
      Tip: si todavía no la instalaste, agregala a tu pantalla de inicio
      ANTES de tocar "Abrir la app", así el ícono queda bien.
    </div>
  </div>

  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbxkbasyeFh1cocblM80N4qQKFRym-0yjQVp_xYp9YaZZWmlILsLmKLcxmBQWbJfJmxu/exec";

    // Registrar el service worker (cachea solo este shell, no los datos)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(function(err) {
        console.warn("No se pudo registrar el service worker:", err);
      });
    }

    function goToApp() {
      window.location.replace(APP_URL);
    }

    document.getElementById("openBtn").addEventListener("click", goToApp);

    // Si ya se abrió desde el ícono instalado (modo standalone), entra directo
    // sin mostrar este botón, para que sea igual de rápido que antes.
    var isStandalone =
      window.navigator.standalone === true || // iOS
      window.matchMedia("(display-mode: standalone)").matches; // Android/otros

    if (isStandalone) {
      goToApp();
    }
  </script>

</body>
</html>
