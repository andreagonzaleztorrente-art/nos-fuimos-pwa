<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>¡Nos Fuimos!</title>

<!-- PWA: manifest -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0E7C7B" />

<!-- Soporte iOS (Safari no lee bien el manifest, necesita estas etiquetas) -->
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Nos Fuimos!" />

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0E7C7B;
    overflow: hidden;
  }
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    background: linear-gradient(180deg, #0E7C7B 0%, #F0993D 100%);
    color: white;
    font-family: -apple-system, system-ui, sans-serif;
  }
  #loading img {
    width: 72px;
    height: 72px;
    border-radius: 16px;
  }
</style>
</head>
<body>

  <!--
    ==========================================================
    ACÁ VA LA URL DE TU APP DE APPS SCRIPT (la que termina en /exec)
    Es la misma que ya usaste en index.html.
    ==========================================================
  -->
  <div id="loading">
    <img src="icons/icon-192.png" alt="Nos Fuimos!" />
    <div>Cargando ¡Nos Fuimos!…</div>
  </div>

  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbxkbasyeFh1cocblM80N4qQKFRym-0yjQVp_xYp9YaZZWmlILsLmKLcxmBQWbJfJmxu/exec";

    // Registrar el service worker (cachea solo este shell, no los datos)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(function(err) {
        console.warn("No se pudo registrar el service worker:", err);
      });
    }

    // Redirección de pantalla completa (evita cualquier bloqueo de iframe)
    window.location.replace(APP_URL);
  </script>

</body>
</html>
